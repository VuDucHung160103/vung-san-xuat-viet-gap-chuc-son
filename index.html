html,body{

border-radius:24px 24px 0 0;

display:flex;

.sheet.expand{

.handle{

height:7px;

background:#bfbfbf;

margin:10px auto;

border-radius:30px;

cursor:pointer;

.title{

padding:0 18px 15px;

font-size:18px;

.list{

overflow:auto;

padding:0 15px 20px;

}).setView([20.9141,105.7183],17);

'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:20,
attribution:'Esri'
});

esri.addTo(map);

'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:20

[20.915914,105.718817],

[20.915481,105.715700],

[20.912075,105.718131]

];

const polygon=L.polygon(polygonCoords,{

color:"#16a34a",

weight:3,

fillColor:"#22c55e",

fillOpacity:.35

}).addTo(map);

polygon.bindPopup(`

<b>Vùng sản xuất Rau VietGAP</b><br>

HTX Dịch vụ nông nghiệp tổng hợp Chúc Sơn

`).openPopup();

map.fitBounds(polygon.getBounds(),{

padding:[40,40]

});

document.getElementById("zoomPolygon").onclick=()=>{

map.fitBounds(polygon.getBounds(),{

padding:[40,40]

});

};

document.getElementById("locateBtn").onclick=function(){

if(!navigator.geolocation){

alert("Thiết bị không hỗ trợ định vị");

return;

}

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude;

const lng=pos.coords.longitude;

L.marker([lat,lng]).addTo(map);

map.setView([lat,lng],18);

},function(){

alert("Không lấy được vị trí");

});

};

const sheet=document.getElementById("sheet");

const handle=document.getElementById("handle");

handle.onclick=function(){

sheet.classList.toggle("expand");

};

let startY=0;

let endY=0;

handle.addEventListener("touchstart",e=>{

startY=e.touches[0].clientY;

});

handle.addEventListener("touchend",e=>{

endY=e.changedTouches[0].clientY;

if(endY<startY-30){

sheet.classList.add("expand");

}

if(endY>startY+30){

sheet.classList.remove("expand");

}

});
