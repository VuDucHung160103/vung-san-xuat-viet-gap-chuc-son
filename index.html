<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vùng sản xuất Rau VietGAP</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
}
#map{
    width:100%;
    height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map("map");

// Ảnh vệ tinh Esri
L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    {
        maxZoom:19,
        attribution:"© Esri"
    }
).addTo(map);

// Tên đường
L.tileLayer(
    "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
    {
        maxZoom:19
    }
).addTo(map);

// 4 góc GPS
const points = [
    [20.913361,105.720369],
    [20.915914,105.718817],
    [20.915481,105.715700],
    [20.912075,105.718131]
];

// Polygon
const poly = L.polygon(points,{
    color:"#ff6f00",
    weight:3,
    fillColor:"#00cc66",
    fillOpacity:0.35
}).addTo(map);

// Marker
points.forEach((p,i)=>{
    L.marker(p).addTo(map);
});

// Popup
poly.bindPopup(
    "<b>Vùng sản xuất Rau VietGAP</b><br>HTX Dịch vụ nông nghiệp tổng hợp Chúc Sơn",
    {
        autoClose:false,
        closeOnClick:false
    }
);

// Zoom tới vùng
map.fitBounds(poly.getBounds(),{
    padding:[30,30],
    animate:false
});

// Sau khi zoom xong thì tự mở popup
map.once("load",function(){
    poly.openPopup();
});

// Dự phòng cho mọi trình duyệt
setTimeout(function(){
    poly.openPopup();
},500);

</script>

</body>
</html>
